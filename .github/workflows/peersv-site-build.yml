name: Build and Deploy peersv-site

on:
  push:
    branches: [main]
    paths:
      - 'peersv-site/**'
      - '.github/workflows/peersv-site-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./peersv-site
          push: true
          tags: ghcr.io/kcydnavnaad/peersv-site:latest
